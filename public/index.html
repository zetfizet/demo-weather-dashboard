<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metabase Embed Demo</title>
    <style>
      :root {
        --bg: #f7f7f2;
        --card: #ffffff;
        --text: #1f2937;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at top left, #d7efe5, var(--bg));
        color: var(--text);
      }

      .container {
        max-width: 1100px;
        margin: 24px auto;
        padding: 0 16px;
      }

      .card {
        background: var(--card);
        border-radius: 14px;
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.08);
        padding: 16px;
      }

      h1 {
        margin-top: 0;
        font-size: 1.5rem;
      }

      .controls {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      button {
        padding: 10px 12px;
        font-size: 14px;
        border-radius: 10px;
        border: 1px solid #d1d5db;
      }

      button {
        background: var(--accent);
        color: white;
        border: none;
        cursor: pointer;
      }

      iframe {
        width: 100%;
        min-height: 75vh;
        border: 0;
        border-radius: 10px;
      }

      .note {
        font-size: 13px;
        margin-top: 8px;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>Metabase Signed Embed Demo</h1>

        <div class="controls">
          <button id="loadBtn">Load Dashboard</button>
        </div>

        <iframe id="mbFrame" title="Metabase Dashboard"></iframe>
        <p class="note">
          Token dibuat di backend, sehingga secret key tidak pernah terekspos ke browser.
        </p>
      </div>
    </div>

    <script>
      async function loadDashboard() {
        const iframe = document.getElementById("mbFrame");

        const response = await fetch("/api/metabase/dashboard-token");

        if (!response.ok) {
          alert("Gagal mengambil token embed.");
          return;
        }

        const data = await response.json();
        const src = `${data.siteUrl}/embed/dashboard/${data.token}#bordered=true&titled=true`;
        iframe.src = src;
      }

      document.getElementById("loadBtn").addEventListener("click", loadDashboard);
      loadDashboard();
    </script>
  </body>
</html>
